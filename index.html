<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy 1st Birthday, pkuhollow!</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌳</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100&display=swap'); /* 引入极客字体 */

    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background: radial-gradient(circle at center, #152243 0%, #0b132b 70%);
      overflow: hidden;
      font-family: 'Noto Serif SC', serif;
      color: #e0e1dd;
    }

    /* 星空背景画布 */
    #star-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      cursor: crosshair; /* 变成十字光标，暗示可以点击 */
    }

    /* 北大地理坐标水印 (修复了看不见的问题) */
    .pku-coordinates {
      position: absolute;
      bottom: 25px;
      left: 25px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      /* 提高了透明度，让它清晰可见 */
      color: rgba(255, 255, 255, 0.4); 
      z-index: 5;
      pointer-events: none;
      letter-spacing: 2px;
      animation: pulse-glow 4s infinite alternate;
      text-align: left;
      cursor: pointer;
      pointer-events: auto;
    }

    @keyframes pulse-glow {
      0% { opacity: 0.1; }
      100% { opacity: 0.3; text-shadow: 0 0 5px rgba(255,255,255,0.2); }
    }

    /* 贺卡主容器 */
    .card-container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 20px;
      pointer-events: none; /* 让点击事件穿透到下层的星空画布 */
      transform: scale(0.9); /* 【新增】整体缩小到90% */
    }

    /* 恢复内部元素的点击响应 */
    .card-container > * {
      pointer-events: auto;
    }

    /* 底部星星交互提示 (独立出来的新样式) */
    .star-hint {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 2px;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      /* 延迟2秒出现，然后无限呼吸闪烁 */
      animation: fadeInHint 2s forwards 2s, pulse-hint 3s infinite alternate 4s;
    }

    @keyframes fadeInHint {
      to { opacity: 1; }
    }

    @keyframes pulse-hint {
      0% { opacity: 0.4; text-shadow: 0 0 0px rgba(255,255,255,0); }
      100% { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.8); }
    }


    /* 西瓜悬浮动画 */
    .floating-watermelon {
      width: 180px;
      height: 180px;
      animation: float 4s ease-in-out infinite;
      filter: drop-shadow(0 0 25px rgba(255, 59, 91, 0.4));
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .floating-watermelon:hover { transform: scale(1.05) rotate(2deg); }
    .floating-watermelon:active { transform: scale(0.9) rotate(-10deg); }

    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(3deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    /* 渐现动画 */
    .fade-in-up {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 1s forwards;
    }

    .delay-1 { animation-delay: 0.5s; }
    .delay-2 { animation-delay: 1.2s; }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* 文字发光效果 */
    .glow-text { text-shadow: 0 0 15px rgba(255, 255, 255, 0.4); }
    .highlight-red { color: #ff3b5b; }
    .highlight-green { color: #7bca51; }

    /* 交互出现的心声 */
    #secret-message {
      opacity: 0;
      visibility: hidden;
      transition: opacity 1.5s, transform 1s;
      transform: translateY(10px);
      margin-top: 35px;
      padding: 20px 30px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(8px);
      position: relative;
    }
    #secret-message.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    /* 右下角专属水印 */
    .watermark {
      position: absolute;
      bottom: 25px;
      right: 25px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.3);
      z-index: 5;
      pointer-events: none;
      transition: color 0.3s ease;
    }
    .watermark:hover {
      color: rgba(255, 255, 255, 0.8);
    }
  </style>
</head>
<body>

  <canvas id="star-canvas"></canvas>

  

  <div class="pku-coordinates" id="pku-coord" style="cursor: pointer; pointer-events: auto;" onclick="triggerCoord()">
    LOC: 39°59'23.0"N 116°18'19.0"E<br>
    STATUS: NOMADIC
  </div>

  <div class="star-hint">
    尝试点击背景里的星星，看看会遇见谁？✨
  </div>

  <div class="card-container">
    
    <!-- 树洞西瓜 SVG -->
    <div class="fade-in-up" onclick="revealSecret()">
      <svg class="floating-watermelon" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <!-- 西瓜红瓤 -->
        <path d="M 100 20 L 20 140 Q 100 180 180 140 Z" fill="#ff445a" />
        <!-- 右半边阴影 -->
        <path d="M 100 20 L 180 140 Q 140 160 100 160 Z" fill="#e81e4d" />
        
        <!-- 西瓜绿皮 -->
        <path d="M 20 140 Q 100 180 180 140 L 190 155 Q 100 200 10 155 Z" fill="#75c25e" />
        <!-- 右半边绿皮阴影 -->
        <path d="M 100 160 Q 140 160 180 140 L 190 155 Q 140 180 100 180 Z" fill="#4ea044" />

        <!-- 蓝黑色的籽 -->
        <g fill="#1a4773">
          <!-- 上排 -->
          <rect x="75" y="70" width="10" height="18" rx="5" />
          <rect x="115" y="70" width="10" height="18" rx="5" />
          <!-- 中排 -->
          <rect x="95" y="95" width="10" height="18" rx="5" />
          <!-- 下排 -->
          <rect x="65" y="115" width="10" height="18" rx="5" />
          <rect x="125" y="115" width="10" height="18" rx="5" />
          <!-- 底部中心偏下 -->
          <rect x="95" y="125" width="10" height="18" rx="5" />
        </g>
      </svg>
    </div>

    <!-- 文案 -->
    <h1 class="text-4xl md:text-5xl font-bold mt-8 mb-2 glow-text fade-in-up delay-1">
      Happy 1st Anniversary
    </h1>
    <h2 class="text-xl md:text-2xl text-gray-400 tracking-widest mb-8 fade-in-up delay-1">
      <span class="highlight-red">pku</span><span class="highlight-green">hollow</span>
    </h2>

    <p class="text-lg md:text-xl max-w-lg leading-relaxed fade-in-up delay-2">
      "这一年，越过有形的围墙，<br>我们在<span class="text-gray-300 font-bold">未名</span>的荒野里，<br>种下了一颗会发光的西瓜。"
    </p>

    <!-- 隐藏的寄语 -->
    <div id="secret-message" class="text-sm md:text-base max-w-md text-gray-300 leading-relaxed shadow-lg">
      致每一位流浪到这里的数字难民：<br><br>
      外面或许有更华丽的洞天，<br>
      有盲水印和树叶买来的热搜。<br>
      但在这里，一切依然粗糙、野生、且自由。<br><br>
      未名之所以为未名，是因为真实的声音不需要被定义。<br>
      <span class="text-white font-bold">兼容并包的灵魂，永远会找到属于自己的旷野。</span><br><br>
      <span class="text-gray-500 italic">— A Hollow Observer</span>
    </div>

  </div>

  <script>
    // --- 星空与洞主彩蛋系统 ---
    const canvas = document.getElementById('star-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let stars = [];
    let floatingTexts = []; // 用于存储漂浮的文字

    // 洞主名单库
    const holeOwners = [
      "四格漫画洞主", "熊熊洞主", "牛排洞主", "每日东方洞主", "幸福洞主",
      "猫猫洞主", "调酒洞主", "wordle洞主", "每日历史洞主", "日语洞主",
      "未名洞观察洞主（嘿嘿正是在下）", "青研老师（吓你一跳😋）", "佛学洞主",
      "Alice", "Bob", "Carol", "Dave", "Hollowdz（致敬！）"
    ];

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }

    // 星星类
    class Star {
      constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = Math.random() * 2 + 0.5; 
        this.speedY = (Math.random() * 0.3) - 0.15;
        this.speedX = (Math.random() * 0.3) - 0.15;
        this.opacity = Math.random();
        this.fadeDir = Math.random() > 0.5 ? 1 : -1;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0) this.x = width;
        if (this.x > width) this.x = 0;
        if (this.y < 0) this.y = height;
        if (this.y > height) this.y = 0;
        
        this.opacity += 0.005 * this.fadeDir;
        if (this.opacity >= 1) { this.opacity = 1; this.fadeDir = -1; } 
        else if (this.opacity <= 0.1) { this.opacity = 0.1; this.fadeDir = 1; }
      }
      draw() {
        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // 漂浮文字类 (被点击的星星变成文字)
    class FloatingText {
      constructor(x, y, text) {
        this.x = x;
        this.y = y;
        this.text = text;
        this.opacity = 1;
        this.life = 120; // 存活帧数
      }
      update() {
        this.y -= 0.8; // 向上飘
        this.life--;
        this.opacity = this.life / 120;
      }
      draw() {
        ctx.fillStyle = `rgba(255, 215, 0, ${this.opacity})`; // 金色文字
        ctx.font = "bold 16px 'Noto Serif SC', serif";
        ctx.textAlign = "center";
        ctx.shadowColor = "rgba(255, 255, 255, 0.5)";
        ctx.shadowBlur = 10;
        ctx.fillText(this.text, this.x, this.y);
        ctx.shadowBlur = 0; // 重置阴影防止影响星星
      }
    }

    function initStars() {
      stars = [];
      // 根据屏幕大小计算星星数量
      const numStars = Math.floor((window.innerWidth * window.innerHeight) / 2500);
      for (let i = 0; i < numStars; i++) { stars.push(new Star()); }
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);
      
      // 绘制星星
      stars.forEach(star => { star.update(); star.draw(); });
      
      // 绘制漂浮文字
      for (let i = floatingTexts.length - 1; i >= 0; i--) {
        let ft = floatingTexts[i];
        ft.update();
        ft.draw();
        if (ft.life <= 0) {
          floatingTexts.splice(i, 1); // 消失后移除
        }
      }
      
      requestAnimationFrame(animate);
    }

    // --- 点击交互逻辑 ---
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;
      
      let hit = false;
      // 遍历寻找距离鼠标最近的星星
      for (let i = 0; i < stars.length; i++) {
        let star = stars[i];
        // 判定距离：允许30像素的误差，方便点击
        const dist = Math.hypot(mouseX - star.x, mouseY - star.y);
        if (dist < 30) {
          // 命中！随机抽取一位洞主
          const randomOwner = holeOwners[Math.floor(Math.random() * holeOwners.length)];
          // 在星星的位置生成文字
          floatingTexts.push(new FloatingText(star.x, star.y, randomOwner));
          
          // 将这颗星星瞬间重置到别的地方（制造被“点爆”的效果）
          star.x = Math.random() * width;
          star.y = Math.random() * height;
          
          hit = true;
          break; // 一次点击只点爆一颗星
        }
      }

      // 如果没点中星星，就在鼠标位置强行生成一个彩蛋，保证体验
      if (!hit) {
         const randomOwner = holeOwners[Math.floor(Math.random() * holeOwners.length)];
         floatingTexts.push(new FloatingText(mouseX, mouseY, randomOwner));
      }
    });

    window.addEventListener('resize', () => { resize(); initStars(); });
    resize(); initStars(); animate();

    // 交互逻辑：点击西瓜显示寄语
    function revealSecret() {
      const msg = document.getElementById('secret-message');
      msg.classList.toggle('show');
    }
   
    // --- 经纬度点击互动 ---
    function triggerCoord() {
      const coord = document.getElementById('pku-coord');
      // 防止连续点击
      if (coord.getAttribute('data-clicked') === 'true') return;
      
      const originalText = coord.innerHTML;
      coord.setAttribute('data-clicked', 'true');
      coord.innerHTML = "SIGNAL RECEIVED<br>UPLOADING MEMORIES...";
      coord.style.color = "#7bca51"; // 变成亮绿色
      coord.style.textShadow = "0 0 10px #7bca51";
      
      setTimeout(() => {
        coord.innerHTML = originalText;
        coord.style.color = "rgba(255, 255, 255, 0.4)";
        coord.style.textShadow = "none";
        coord.setAttribute('data-clicked', 'false');
      }, 2500); // 2.5秒后恢复原状
    }

  </script>
   
  <style>
    .click-ripple {
      position: absolute;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.6);
      transform: translate(-50%, -50%);
      animation: ripple-animate 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
      pointer-events: none; /* 防止阻挡其他点击 */
      z-index: 9999;
    }
    @keyframes ripple-animate {
      0% { width: 0px; height: 0px; opacity: 1; }
      100% { width: 80px; height: 80px; opacity: 0; }
    }
  </style>
  <script>
    document.addEventListener('mousedown', function(e) {
      // 创建波纹元素
      const ripple = document.createElement('div');
      ripple.className = 'click-ripple';
      ripple.style.left = e.clientX + 'px';
      ripple.style.top = e.clientY + 'px';
      document.body.appendChild(ripple);
      // 动画结束后自动清理垃圾
      setTimeout(() => { ripple.remove(); }, 600);
    });
  </script>

  <script>
    (function() {
      const originalTitle = document.title;
      document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
          // 离开页面时的文案
          document.title = "🪐 未名的星光仍在闪烁...";
        } else {
          // 回来时的文案
          document.title = "✨ 欢迎回洞！";
          setTimeout(() => { document.title = originalTitle; }, 2000);
        }
      });
    })();
  </script>

  <style>
    .shooting-star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 5px 1px rgba(255, 255, 255, 0.8);
      opacity: 0;
      z-index: 1;
      pointer-events: none;
      animation: shooting 1.5s ease-in-out forwards;
    }
    .shooting-star::after {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 60px; /* 尾巴长度 */
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0.8), transparent);
    }
    @keyframes shooting {
      0% { transform: translate(0, 0) rotate(-45deg); opacity: 1; }
      100% { transform: translate(-300px, 300px) rotate(-45deg); opacity: 0; }
    }
  </style>
  <script>
    (function() {
      function createShootingStar() {
        const star = document.createElement('div');
        star.className = 'shooting-star';
        // 随机生成在屏幕右侧或上方
        star.style.left = (Math.random() * window.innerWidth + 200) + 'px';
        star.style.top = (Math.random() * window.innerHeight / 2 - 100) + 'px';
        document.body.appendChild(star);
        
        // 动画结束后移除
        setTimeout(() => { star.remove(); }, 1500);
      }
      
      // 每隔 4 到 7 秒随机生成一颗流星
      function scheduleNextStar() {
        const delay = Math.random() * 3000 + 4000;
        setTimeout(() => {
          createShootingStar();
          scheduleNextStar();
        }, delay);
      }
      // 延迟 2 秒后开始第一颗流星
      setTimeout(scheduleNextStar, 2000);
    })();
  </script>
  

  <div class="watermark">
    By @whatsinpkuhollow
  </div>

</body>
</html>
